    <text x="55" y="706" fill="#ff8c86">Red means tensor or text</text>
    <text x="55" y="736" fill="#8be87a">Green means Process</text>
    <text x="55" y="766" fill="#f2f2f2">Process 1-5 Once Per Batch</text>
    <text x="55" y="796" fill="#f2f2f2">Process 6-10 (Update Epoch*Batch/Mini Batch) times  Per Batch</text>
