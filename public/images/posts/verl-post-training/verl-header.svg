      <text x="537" y="140">Evaluate</text>
      <text x="995" y="140">KL Penalty</text>
      <text x="535" y="383">Old Policy Sampling</text>
      <text x="535" y="400">(no grad)</text>
      <text x="995" y="490">Generalized Advantage</text>
      <text x="995" y="507">Estimation</text>
      <text x="535" y="601">New Policy Sampling</text>
