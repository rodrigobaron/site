<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 512" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="ar-node" cx="0.5" cy="0.38" r="0.62">
      <stop offset="0" stop-color="#ffd98a"/>
      <stop offset="1" stop-color="#ff7a18"/>
    </radialGradient>
    <radialGradient id="ar-core" cx="0.5" cy="0.38" r="0.7">
      <stop offset="0" stop-color="#fff0c8"/>
      <stop offset="0.55" stop-color="#ffb347"/>
      <stop offset="1" stop-color="#ff6a13"/>
    </radialGradient>
    <linearGradient id="ar-db" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5ec8ff"/>
      <stop offset="1" stop-color="#2f6fd0"/>
    </linearGradient>
    <radialGradient id="ar-chunk" cx="0.5" cy="0.38" r="0.62">
      <stop offset="0" stop-color="#aee3ff"/>
      <stop offset="1" stop-color="#2f6fd0"/>
    </radialGradient>
    <marker id="ar-mk-amber" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ff9a3c"/></marker>
    <marker id="ar-mk-teal" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5ec8ff"/></marker>
    <marker id="ar-mk-green" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6fe06a"/></marker>
    <filter id="ar-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ar-strong" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===================== knowledge base / corpus (top-left) ===================== -->
  <g>
    <g fill="#16314f" stroke="#5ec8ff" stroke-width="1.8" opacity="0.92">
      <rect x="70" y="78" width="46" height="58" rx="5"/>
      <rect x="86" y="68" width="46" height="58" rx="5"/>
      <rect x="102" y="58" width="46" height="58" rx="5"/>
    </g>
    <g stroke="#7fd0f0" stroke-width="2" opacity="0.55">
      <line x1="112" y1="74" x2="138" y2="74"/>
      <line x1="112" y1="84" x2="138" y2="84"/>
      <line x1="112" y1="94" x2="132" y2="94"/>
    </g>
    <text x="108" y="158" font-family="ui-monospace, Menlo, monospace" font-size="12" letter-spacing="1.5" fill="#7fd0f0" opacity="0.8" text-anchor="middle">CORPUS</text>
    <!-- corpus -> retriever -->
    <path d="M156,92 Q360,70 558,104" fill="none" stroke="#5ec8ff" stroke-width="2"
          stroke-dasharray="2 8" opacity="0.5" marker-end="url(#ar-mk-teal)"/>
  </g>

  <!-- ===================== retriever / vector store (top-center) ===================== -->
  <g>
    <!-- embedded chunks around the store -->
    <g fill="url(#ar-chunk)" filter="url(#ar-soft)">
      <rect x="548" y="72" width="20" height="20" rx="4"/>
      <rect x="712" y="74" width="20" height="20" rx="4"/>
      <rect x="556" y="140" width="20" height="20" rx="4"/>
      <rect x="704" y="140" width="20" height="20" rx="4"/>
    </g>
    <!-- vector DB cylinder -->
    <g filter="url(#ar-soft)">
      <path d="M592,90 L592,140 A48,14 0 0 0 688,140 L688,90" fill="url(#ar-db)" opacity="0.95"/>
      <ellipse cx="640" cy="90" rx="48" ry="14" fill="#7fd0f0"/>
      <ellipse cx="640" cy="90" rx="48" ry="14" fill="none" stroke="#bfeaff" stroke-width="1.5"/>
      <path d="M592,112 A48,14 0 0 0 688,112" fill="none" stroke="#bfeaff" stroke-width="1.2" opacity="0.6"/>
    </g>
    <!-- search magnifier -->
    <g stroke="#0b2238" stroke-width="2.4" fill="none">
      <circle cx="636" cy="116" r="9"/><line x1="643" y1="123" x2="651" y2="131"/>
    </g>
    <text x="640" y="48" font-family="ui-monospace, Menlo, monospace" font-size="13" letter-spacing="1.5" fill="#7fd0f0" opacity="0.85" text-anchor="middle">RETRIEVER</text>
  </g>

  <!-- ===================== query decomposition (left) ===================== -->
  <g>
    <circle cx="108" cy="312" r="16" fill="url(#ar-chunk)" filter="url(#ar-soft)"/>
    <text x="108" y="317" font-size="16" font-weight="bold" fill="#0b2238" text-anchor="middle">?</text>
    <g stroke="#5ec8ff" stroke-width="1.4" opacity="0.5" fill="none">
      <path d="M124,306 Q134,276 146,276"/>
      <path d="M126,312 Q136,312 146,312"/>
      <path d="M124,318 Q134,348 146,348"/>
    </g>
    <g fill="#2f6fd0" stroke="#5ec8ff" stroke-width="1.4" opacity="0.92">
      <rect x="146" y="269" width="150" height="14" rx="7"/>
      <rect x="146" y="305" width="172" height="14" rx="7"/>
      <rect x="146" y="341" width="128" height="14" rx="7"/>
    </g>
    <path d="M330,312 L560,312" fill="none" stroke="#5ec8ff" stroke-width="2.6"
          stroke-linecap="round" marker-end="url(#ar-mk-teal)" filter="url(#ar-soft)"/>
  </g>

  <!-- ===================== agent core + retrieval loop (center) ===================== -->
  <g>
    <!-- loop: agent <-> retriever -->
    <path d="M620,260 C560,216 560,198 614,158" fill="none" stroke="#ff9a3c" stroke-width="2.8"
          marker-end="url(#ar-mk-amber)" filter="url(#ar-soft)"/>
    <path d="M666,158 C720,198 720,216 660,260" fill="none" stroke="#5ec8ff" stroke-width="2.8"
          marker-end="url(#ar-mk-teal)" filter="url(#ar-soft)"/>
    <text x="552" y="212" font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="1" fill="#ffd98a" opacity="0.8" text-anchor="end">search</text>
    <text x="728" y="212" font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="1" fill="#9bd6e8" opacity="0.8">context</text>

    <!-- agent hexagon -->
    <g filter="url(#ar-strong)">
      <polygon points="692,312 666,357 614,357 588,312 614,267 666,267"
               fill="url(#ar-core)" stroke="#ffe2a6" stroke-width="2.5"/>
    </g>
    <text x="640" y="319" text-anchor="middle" font-size="20" font-weight="bold" fill="#3a1500" letter-spacing="1">AGENT</text>

    <!-- refine indicator -->
    <path d="M642,372 a14,14 0 1 1 -10,-4" fill="none" stroke="#ff8a1e" stroke-width="2.2" opacity="0.85"/>
    <path d="M628,360 L632,372 L642,366 Z" fill="#ff8a1e" opacity="0.85"/>
    <text x="664" y="384" font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="1" fill="#ffd98a" opacity="0.75">reflect &amp; refine</text>

    <!-- agent -> answer -->
    <path d="M694,312 L992,312" fill="none" stroke="#ff8a1e" stroke-width="2.8"
          stroke-linecap="round" marker-end="url(#ar-mk-green)" filter="url(#ar-soft)"/>
    <text x="843" y="300" font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="1" fill="#ffd98a" opacity="0.75" text-anchor="middle">synthesize</text>
  </g>

  <!-- ===================== grounded answer (right) ===================== -->
  <g filter="url(#ar-soft)">
    <path d="M1012,244 L1104,244 L1128,268 L1128,392 L1012,392 Z" fill="#15331f" stroke="#6fe06a" stroke-width="2.2"/>
    <path d="M1104,244 L1104,268 L1128,268" fill="none" stroke="#6fe06a" stroke-width="2.2"/>
    <path d="M1070,278 l6,11 l12,2 l-9,9 l2,12 l-11,-6 l-11,6 l2,-12 l-9,-9 l12,-2 Z"
          fill="#c9f3b0" opacity="0.95"/>
    <g fill="#6fe06a" opacity="0.6">
      <rect x="1028" y="328" width="72" height="6" rx="3"/>
      <rect x="1028" y="346" width="84" height="6" rx="3"/>
      <rect x="1028" y="364" width="58" height="6" rx="3"/>
    </g>
  </g>

  <!-- ===================== zone labels ===================== -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="14" letter-spacing="2">
    <text x="60"  y="466" fill="#7fd0f0" opacity="0.85">QUERY DECOMPOSITION</text>
    <text x="640" y="466" fill="#ffb14a" opacity="0.9" text-anchor="middle">AGENTIC RETRIEVAL LOOP</text>
    <text x="1240" y="466" fill="#8be87a" opacity="0.85" text-anchor="end">GROUNDED ANSWER</text>
  </g>
</svg>
