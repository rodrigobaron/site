<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="lc-hatch" width="11" height="11" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="11" stroke="#5a9e3a" stroke-width="2.4" opacity="0.55"/>
    </pattern>
    <marker id="lc-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M1,1 L9,5 L1,9 Z" fill="#c2cedb"/></marker>
  </defs>

  <!-- ============ dashed radiating arrows ============ -->
  <g stroke="#c2cedb" stroke-width="2.4" stroke-dasharray="9 8" fill="none" marker-end="url(#lc-ar)">
    <line x1="640" y1="214" x2="640" y2="120"/>
    <line x1="528" y1="224" x2="288" y2="132"/>
    <line x1="752" y1="224" x2="992" y2="132"/>
    <line x1="528" y1="296" x2="288" y2="372"/>
    <line x1="752" y1="296" x2="992" y2="372"/>
    <line x1="640" y1="306" x2="640" y2="398"/>
  </g>

  <!-- ============ central LangChain box ============ -->
  <rect x="510" y="218" width="260" height="84" fill="url(#lc-hatch)" stroke="#4a8c2e" stroke-width="2.2"/>
  <g stroke="#4a8c2e" stroke-width="2.2">
    <line x1="510" y1="210" x2="510" y2="232"/><line x1="510" y1="288" x2="510" y2="310"/>
    <line x1="770" y1="210" x2="770" y2="232"/><line x1="770" y1="288" x2="770" y2="310"/>
  </g>
  <text x="640" y="268" text-anchor="middle" font-size="25" font-weight="bold" fill="#e8f2e0">🦜 LangChain 🔗</text>

  <!-- ============ components: icon + label ============ -->
  <g font-size="19" text-anchor="middle" fill="#e2e9ef">
    <text x="640"  y="106">Vectorstores</text>
    <text x="214"  y="124">Document Loaders</text>
    <text x="1066" y="124">Prompts</text>
    <text x="214"  y="452">LLMs</text>
    <text x="1066" y="452">Agents</text>
    <text x="640"  y="470">Chains</text>
  </g>

  <!-- Vectorstores: database cylinder -->
  <g transform="translate(640,52)">
    <path d="M-20,-14 a20,7 0 0 1 40,0 v22 a20,7 0 0 1 -40,0 Z" fill="#ecc24e" stroke="#c89a2e" stroke-width="1.6"/>
    <ellipse cx="0" cy="-14" rx="20" ry="7" fill="#f6d878" stroke="#c89a2e" stroke-width="1.6"/>
    <path d="M-20,-2 a20,7 0 0 0 40,0" fill="none" stroke="#c89a2e" stroke-width="1.4" opacity="0.7"/>
  </g>

  <!-- Document Loaders: document -->
  <g transform="translate(214,46)">
    <path d="M-19,-22 H11 L19,-14 V22 H-19 Z" fill="#d3dde5" stroke="#8a949c" stroke-width="1.6"/>
    <path d="M11,-22 V-14 H19 Z" fill="#b6c2cc" stroke="#8a949c" stroke-width="1.4"/>
    <g stroke="#7d8893" stroke-width="2.4"><line x1="-12" y1="-6" x2="12" y2="-6"/><line x1="-12" y1="2" x2="12" y2="2"/><line x1="-12" y1="10" x2="4" y2="10"/></g>
  </g>

  <!-- Prompts: terminal / robot -->
  <g transform="translate(1066,48)">
    <line x1="0" y1="-26" x2="0" y2="-20" stroke="#9aa4ac" stroke-width="2"/><circle cx="0" cy="-28" r="3" fill="#7fb3ff"/>
    <rect x="-24" y="-20" width="48" height="36" rx="6" fill="#f2efe0" stroke="#9aa4ac" stroke-width="1.6"/>
    <text x="-15" y="6" font-family="ui-monospace, Menlo, monospace" font-size="18" fill="#2a6e8a">&gt;_</text>
  </g>

  <!-- LLMs: neural network nodes -->
  <g transform="translate(214,392)">
    <g stroke="#9aa4ac" stroke-width="1.6">
      <line x1="0" y1="0" x2="-18" y2="-14"/><line x1="0" y1="0" x2="18" y2="-14"/><line x1="0" y1="0" x2="-20" y2="12"/><line x1="0" y1="0" x2="20" y2="12"/><line x1="0" y1="0" x2="2" y2="22"/>
    </g>
    <circle cx="0" cy="0" r="8" fill="#e0685a"/>
    <circle cx="-18" cy="-14" r="7" fill="#6aa0e0"/>
    <circle cx="18" cy="-14" r="7" fill="#4fb0a0"/>
    <circle cx="-20" cy="12" r="7" fill="#4fb0a0"/>
    <circle cx="20" cy="12" r="7" fill="#f0a040"/>
    <circle cx="2" cy="22" r="6" fill="#6aa0e0"/>
  </g>

  <!-- Chains: interlocking links -->
  <g transform="translate(640,418)" fill="none" stroke-width="6" stroke-linecap="round">
    <rect x="-26" y="-11" width="34" height="22" rx="11" stroke="#3a7d6e" transform="rotate(-32 -9 0)"/>
    <rect x="-8" y="-11" width="34" height="22" rx="11" stroke="#e0843c" transform="rotate(-32 9 0)"/>
  </g>

  <!-- Agents: head with circuit -->
  <g transform="translate(1066,392)">
    <circle cx="0" cy="0" r="23" fill="#f5e7d4" stroke="#d8943c" stroke-width="2"/>
    <rect x="-9" y="-9" width="18" height="18" rx="3" fill="none" stroke="#c06a2e" stroke-width="2"/>
    <g stroke="#c06a2e" stroke-width="1.8"><line x1="-9" y1="-3" x2="-15" y2="-3"/><line x1="-9" y1="4" x2="-15" y2="4"/><line x1="9" y1="-3" x2="15" y2="-3"/><line x1="9" y1="4" x2="15" y2="4"/><line x1="-3" y1="-9" x2="-3" y2="-15"/><line x1="4" y1="-9" x2="4" y2="-15"/></g>
    <circle cx="0" cy="0" r="3.5" fill="#c06a2e"/>
  </g>
</svg>
