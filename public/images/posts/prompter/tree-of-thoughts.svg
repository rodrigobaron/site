<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 650" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="tt-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1,1 L9,5 L1,9 Z" fill="#9aa4ac"/></marker>
    <marker id="tt-grn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" fill="#3f9e2a"/></marker>
    <marker id="tt-pnk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M1,1 L9,5 L1,9 Z" fill="#f0b9b9"/></marker>
  </defs>

  <!-- ============ (a) Input-Output (IO) ============ -->
  <line x1="110" y1="102" x2="110" y2="478" stroke="#9aa4ac" stroke-width="2" marker-end="url(#tt-g)"/>
  <ellipse cx="110" cy="72" rx="58" ry="30" fill="#eef1f3" stroke="#99a4ac" stroke-width="1.6"/>
  <ellipse cx="110" cy="512" rx="62" ry="31" fill="#d6e8c2" stroke="#8db368" stroke-width="1.6"/>
  <text x="110" y="79" text-anchor="middle" font-size="22" fill="#2a2f34">Input</text>
  <text x="110" y="519" text-anchor="middle" font-size="22" fill="#2a3a20">Output</text>

  <!-- ============ (c) Chain of Thought (CoT) ============ -->
  <g stroke="#9aa4ac" stroke-width="2" fill="none">
    <line x1="300" y1="102" x2="300" y2="168" marker-end="url(#tt-g)"/>
    <line x1="300" y1="212" x2="300" y2="252" marker-end="url(#tt-g)"/>
    <line x1="300" y1="288" x2="300" y2="328" marker-end="url(#tt-g)"/>
    <line x1="300" y1="372" x2="300" y2="478" marker-end="url(#tt-g)"/>
  </g>
  <text x="300" y="275" text-anchor="middle" font-size="20" letter-spacing="2" fill="#aab4bd">......</text>
  <g fill="#e4e4e4" stroke="#b0b0b0" stroke-width="1.5">
    <rect x="268" y="172" width="64" height="38" rx="5"/>
    <rect x="268" y="332" width="64" height="38" rx="5"/>
  </g>
  <ellipse cx="300" cy="72" rx="58" ry="30" fill="#eef1f3" stroke="#99a4ac" stroke-width="1.6"/>
  <ellipse cx="300" cy="512" rx="62" ry="31" fill="#d6e8c2" stroke="#8db368" stroke-width="1.6"/>
  <text x="300" y="79" text-anchor="middle" font-size="22" fill="#2a2f34">Input</text>
  <text x="300" y="519" text-anchor="middle" font-size="22" fill="#2a3a20">Output</text>

  <!-- ============ (c) Self Consistency (CoT-SC) ============ -->
  <g stroke="#9aa4ac" stroke-width="2" fill="none">
    <!-- input branches -->
    <path d="M478,96 C452,130 440,140 434,166" marker-end="url(#tt-g)"/>
    <line x1="490" y1="102" x2="490" y2="166" marker-end="url(#tt-g)"/>
    <path d="M502,96 C528,130 540,140 546,166" marker-end="url(#tt-g)"/>
    <!-- box -> box -->
    <line x1="434" y1="248" x2="434" y2="262" marker-end="url(#tt-g)"/>
    <line x1="490" y1="248" x2="490" y2="262" marker-end="url(#tt-g)"/>
    <line x1="546" y1="248" x2="546" y2="262" marker-end="url(#tt-g)"/>
    <!-- box -> outcome -->
    <line x1="434" y1="306" x2="434" y2="332" marker-end="url(#tt-g)"/>
    <line x1="490" y1="306" x2="490" y2="332" marker-end="url(#tt-g)"/>
    <line x1="546" y1="306" x2="546" y2="332" marker-end="url(#tt-g)"/>
    <!-- majority vote -> output -->
    <line x1="490" y1="408" x2="490" y2="478" marker-end="url(#tt-g)"/>
  </g>
  <g font-size="18" letter-spacing="2" fill="#aab4bd" text-anchor="middle">
    <text x="434" y="232">....</text><text x="490" y="232">....</text><text x="546" y="232">....</text>
  </g>
  <g fill="#e4e4e4" stroke="#b0b0b0" stroke-width="1.5">
    <rect x="410" y="170" width="48" height="34" rx="5"/><rect x="466" y="170" width="48" height="34" rx="5"/><rect x="522" y="170" width="48" height="34" rx="5"/>
    <rect x="410" y="266" width="48" height="34" rx="5"/><rect x="466" y="266" width="48" height="34" rx="5"/><rect x="522" y="266" width="48" height="34" rx="5"/>
  </g>
  <ellipse cx="434" cy="352" rx="26" ry="18" fill="#82c25e" stroke="#5e9e42" stroke-width="1.5"/>
  <ellipse cx="490" cy="352" rx="26" ry="18" fill="#82c25e" stroke="#5e9e42" stroke-width="1.5"/>
  <ellipse cx="546" cy="352" rx="26" ry="18" fill="#f2c2c2" stroke="#dd9a9a" stroke-width="1.5"/>
  <!-- brace + majority vote -->
  <path d="M410,378 Q410,392 450,392 Q490,392 490,400 Q490,392 530,392 Q570,392 570,378" fill="none" stroke="#9aa4ac" stroke-width="1.6"/>
  <text x="582" y="396" font-size="14" font-style="italic" fill="#c2cedb">Majority vote</text>
  <ellipse cx="490" cy="72" rx="58" ry="30" fill="#eef1f3" stroke="#99a4ac" stroke-width="1.6"/>
  <ellipse cx="490" cy="512" rx="62" ry="31" fill="#d6e8c2" stroke="#8db368" stroke-width="1.6"/>
  <text x="490" y="79" text-anchor="middle" font-size="22" fill="#2a2f34">Input</text>
  <text x="490" y="519" text-anchor="middle" font-size="22" fill="#2a3a20">Output</text>

  <!-- ============ divider ============ -->
  <line x1="700" y1="34" x2="700" y2="560" stroke="#5a6b78" stroke-width="2" stroke-dasharray="3 9" opacity="0.6"/>

  <!-- ============ (d) Tree of Thoughts (ToT) ============ -->
  <!-- pink (pruned) arrows first -->
  <g fill="none" stroke="#f0b9b9" stroke-width="1.8">
    <path d="M1004,98 C1040,128 1056,140 1064,156" marker-end="url(#tt-pnk)"/>
    <path d="M962,196 C928,228 912,238 900,254" marker-end="url(#tt-pnk)"/>
    <path d="M978,198 L978,254" marker-end="url(#tt-pnk)"/>
    <path d="M998,196 C1090,228 1120,238 1142,254" marker-end="url(#tt-pnk)"/>
    <path d="M792,294 C786,316 784,330 790,352" marker-end="url(#tt-pnk)"/>
    <path d="M806,296 C840,326 858,336 872,352" marker-end="url(#tt-pnk)"/>
    <path d="M1058,296 C1064,318 1066,332 1070,352" marker-end="url(#tt-pnk)"/>
    <path d="M1082,296 C1116,326 1136,336 1150,352" marker-end="url(#tt-pnk)"/>
  </g>
  <!-- green (selected) arrows -->
  <g fill="none" stroke="#3f9e2a" stroke-width="3">
    <path d="M956,98 C924,128 908,138 900,156" marker-end="url(#tt-grn)"/>
    <line x1="980" y1="100" x2="980" y2="156" marker-end="url(#tt-grn)"/>
    <path d="M958,196 C880,228 840,240 814,254" marker-end="url(#tt-grn)"/>
    <path d="M1000,196 C1030,228 1044,240 1058,254" marker-end="url(#tt-grn)"/>
    <path d="M1052,296 C1010,330 994,340 980,354" marker-end="url(#tt-grn)"/>
    <line x1="980" y1="394" x2="980" y2="480" marker-end="url(#tt-grn)"/>
  </g>
  <text x="980" y="438" text-anchor="middle" font-size="20" letter-spacing="2" fill="#aab4bd">......</text>

  <!-- ToT nodes -->
  <g stroke-width="1.6">
    <!-- L1 -->
    <rect x="857" y="156" width="70" height="36" rx="6" fill="#a7d68a" stroke="#6fae4e"/>
    <rect x="945" y="156" width="70" height="36" rx="6" fill="#3f9e2a" stroke="#2e7d1e"/>
    <rect x="1033" y="156" width="70" height="36" rx="6" fill="#f7dada" stroke="#e6b0b0"/>
    <!-- L2 -->
    <rect x="769" y="254" width="70" height="36" rx="6" fill="#a7d68a" stroke="#6fae4e"/>
    <rect x="857" y="254" width="70" height="36" rx="6" fill="#f7dada" stroke="#e6b0b0"/>
    <rect x="945" y="254" width="70" height="36" rx="6" fill="#f7dada" stroke="#e6b0b0"/>
    <rect x="1033" y="254" width="70" height="36" rx="6" fill="#3f9e2a" stroke="#2e7d1e"/>
    <rect x="1121" y="254" width="70" height="36" rx="6" fill="#f7dada" stroke="#e6b0b0"/>
    <!-- L3 -->
    <rect x="769" y="354" width="70" height="36" rx="6" fill="#f7dada" stroke="#e6b0b0"/>
    <rect x="857" y="354" width="70" height="36" rx="6" fill="#f7dada" stroke="#e6b0b0"/>
    <rect x="945" y="354" width="70" height="36" rx="6" fill="#3f9e2a" stroke="#2e7d1e"/>
    <rect x="1033" y="354" width="70" height="36" rx="6" fill="#f7dada" stroke="#e6b0b0"/>
    <rect x="1121" y="354" width="70" height="36" rx="6" fill="#f7dada" stroke="#e6b0b0"/>
  </g>
  <ellipse cx="980" cy="72" rx="58" ry="30" fill="#eef1f3" stroke="#99a4ac" stroke-width="1.6"/>
  <ellipse cx="980" cy="512" rx="62" ry="31" fill="#d6e8c2" stroke="#8db368" stroke-width="1.6"/>
  <text x="980" y="79" text-anchor="middle" font-size="22" fill="#2a2f34">Input</text>
  <text x="980" y="519" text-anchor="middle" font-size="22" fill="#2a3a20">Output</text>

  <!-- legend -->
  <rect x="1128" y="44" width="118" height="50" rx="4" fill="none" stroke="#7a8894" stroke-width="1.4" stroke-dasharray="4 4"/>
  <rect x="1144" y="56" width="34" height="26" rx="4" fill="#e4e4e4" stroke="#b0b0b0" stroke-width="1.4"/>
  <text x="1190" y="77" font-size="15" fill="#c2cedb">thought</text>

  <!-- ============ captions ============ -->
  <g text-anchor="middle" fill="#c2cedb" font-size="18">
    <text x="110" y="582">(a) Input-Output</text>
    <text x="110" y="606">Prompting (<tspan text-decoration="underline">IO</tspan>)</text>
    <text x="300" y="582">(c) Chain of Thought</text>
    <text x="300" y="606">Prompting (<tspan text-decoration="underline">CoT</tspan>)</text>
    <text x="490" y="582">(c) Self Consistency</text>
    <text x="490" y="606">with CoT (<tspan text-decoration="underline">CoT-SC</tspan>)</text>
    <text x="980" y="596" font-weight="bold" font-size="20">(d) Tree of Thoughts (<tspan text-decoration="underline">ToT</tspan>)</text>
  </g>
</svg>
